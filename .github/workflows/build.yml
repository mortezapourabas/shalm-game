name: Build Shalm APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Download Vazirmatn Font
        run: |
          mkdir -p assets/fonts
          curl -L "https://github.com/rastikerdar/vazirmatn/raw/master/fonts/ttf/Vazirmatn-Regular.ttf" \
            -o assets/fonts/Vazirmatn-Regular.ttf
          curl -L "https://github.com/rastikerdar/vazirmatn/raw/master/fonts/ttf/Vazirmatn-Bold.ttf" \
            -o assets/fonts/Vazirmatn-Bold.ttf
          ls assets/fonts/

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK (Debug)
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Build APK (Release)
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: shalm-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: shalm-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
